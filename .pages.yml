# PagesCMS 配置 - Firefly 博客
# 基于 PagesCMS v2.x 官方 schema 编写
# 文档: https://pagescms.org/docs/configuration/
#
# 配置分为两种编辑模式：
# 🟢 简易模式 (format: json) — 像写文章一样，通过表单字段编辑
#    许可证、公告栏、PlantUML、代码块样式
# 🟡 代码模式 (format: code) — 直接编辑 TypeScript 源文件
#    站点主配置、个人信息、导航栏、侧边栏、页脚、字体、
#    封面图、背景壁纸、评论、统计、音乐、打赏、友链、樱花、相册、看板娘
# 🔵 内容模式 (format: yaml-frontmatter) — 编辑博客内容
#    博客文章、关于页面、友情链接、留言板

media:
  # 文章配图 - 上传到文章目录的 images 子文件夹
  - name: post-images
    label: 文章配图
    input: src/content/posts/images
    output: /images
    categories: [image]

  # public 静态资源 - 封面图、音乐封面等
  - name: assets
    label: 站点资源
    input: public/assets
    output: /assets
    categories: [image]

  # 头图 / 壁纸
  - name: banner
    label: 站点头图
    input: public/assets/images
    output: /assets/images
    categories: [image]

content:
  # ============================================================
  # 📝 内容页面
  # ============================================================
  - name: content-pages
    label: 📝 内容页面
    type: group
    items:
      # 博客文章 (collection)
      - name: posts
        label: 📝 博客文章
        type: collection
        path: src/content/posts
        format: yaml-frontmatter
        filename: "{primary}.md"
        exclude: ["**/images/**"]
        view:
          primary: title
          fields: [title, published, tags, category, draft, pinned]
          sort: ["published desc", "title asc"]
          search: [title, description, tags, category]
          default:
            sort: published
            order: desc
        fields:
          - name: title
            label: 标题
            type: string
            required: true
            description: 文章标题

          - name: published
            label: 发布时间
            type: date
            required: true
            options:
              time: false
              format: yyyy-MM-dd

          - name: updated
            label: 更新时间
            type: date
            options:
              time: false
              format: yyyy-MM-dd

          - name: draft
            label: 草稿
            type: boolean
            default: false

          - name: description
            label: 文章摘要
            type: text
            description: 简短描述，留空则自动截取正文

          - name: image
            label: 封面图
            type: image
            description: 文章封面图片路径

          - name: tags
            label: 标签
            type: select
            options:
              multiple: true
              creatable: true
              values:
                - { label: 演示, value: 演示 }
                - { label: 示例, value: 示例 }
                - { label: Markdown, value: Markdown }
                - { label: Firefly, value: Firefly }
                - { label: 博客, value: 博客 }
                - { label: 主题, value: 主题 }
                - { label: 教程, value: 教程 }
                - { label: JavaScript, value: JavaScript }
                - { label: Astro, value: Astro }

          - name: category
            label: 分类
            type: string
            description: 文章分类（如"文章示例"、"技术笔记"）

          - name: lang
            label: 语言
            type: select
            options:
              values:
                - { label: 中文, value: "" }
                - { label: English, value: en }
                - { label: 日本語, value: ja }
                - { label: 繁體中文, value: zh_TW }
                - { label: Русский, value: ru }

          - name: pinned
            label: 置顶
            type: boolean
            default: false

          - name: author
            label: 作者
            type: string
            description: 覆盖默认作者名（通常留空）

          - name: sourceLink
            label: 原文链接
            type: string
            description: 转载/翻译文章的原始出处

          - name: licenseName
            label: 许可协议名称
            type: string
            description: 如 CC BY-NC-SA 4.0

          - name: licenseUrl
            label: 许可协议链接
            type: string

          - name: comment
            label: 启用评论
            type: boolean
            default: true

          - name: password
            label: 文章密码
            type: string
            description: 设置后需要密码才能查看（留空为公开）

          - name: passwordHint
            label: 密码提示
            type: string
            description: 提示访问者密码是什么

          - name: body
            label: 正文
            type: rich-text
            required: true

      # 关于页面
      - name: about
        label: 📄 关于页面
        type: file
        path: src/content/spec/about.md
        format: yaml-frontmatter
        fields:
          - name: title
            label: 页面标题
            type: string
            default: "关于我"
          - name: body
            label: 正文
            type: rich-text

      # 友情链接
      - name: friends
        label: 🔗 友情链接
        type: file
        path: src/content/spec/friends.mdx
        format: yaml-frontmatter
        fields:
          - name: title
            label: 页面标题
            type: string
            default: 友情链接
          - name: description
            label: 页面描述
            type: string
          - name: body
            label: 正文
            type: code
            options:
              format: mdx
            description: MDX 格式（包含 JSX 组件），使用代码模式编辑

      # 留言板
      - name: guestbook
        label: 📬 留言板
        type: file
        path: src/content/spec/guestbook.md
        format: yaml-frontmatter
        fields:
          - name: title
            label: 页面标题
            type: string
            default: 留言板
          - name: body
            label: 正文
            type: rich-text

  # ============================================================
  # ⚙️ 站点设置
  # ============================================================
  - name: site-settings
    label: ⚙️ 站点设置
    type: group
    description: 核心站点配置，包括标题、域名、SEO、个人信息等
    items:
      - name: site-config
        label: 🌐 站点主配置
        type: file
        path: src/config/siteConfig.ts
        format: code
        description: 站点标题、URL、主题色、分页、Bangumi 等核心设置

      - name: profile-config
        label: 👤 个人信息
        type: file
        path: src/config/profileConfig.ts
        format: code
        description: 头像、昵称、签名、社交链接等个人资料配置

      - name: announcement-config
        label: 📢 公告栏
        type: file
        path: src/config/data/announcement.json
        format: json
        description: 博客顶部公告栏的标题、内容和链接配置
        fields:
          - name: title
            label: 公告标题
            type: string
            default: 公告
          - name: content
            label: 公告内容
            type: text
            required: true
          - name: closable
            label: 允许关闭
            type: boolean
            default: true
          - name: linkEnable
            label: 启用链接
            type: boolean
            default: true
          - name: linkText
            label: 链接文字
            type: string
            default: 了解更多
          - name: linkUrl
            label: 链接地址
            type: string
            default: /about/
          - name: linkExternal
            label: 外部链接
            type: boolean
            default: false

      - name: license-config
        label: 📜 许可协议
        type: file
        path: src/config/data/license.json
        format: json
        description: 文章底部版权声明（如 CC BY-NC-SA 4.0）
        fields:
          - name: enable
            label: 启用许可协议
            type: boolean
            default: true
          - name: name
            label: 许可证名称
            type: string
            default: CC BY-NC-SA 4.0
          - name: url
            label: 许可证链接
            type: string
            default: https://creativecommons.org/licenses/by-nc-sa/4.0/

  # ============================================================
  # 🎨 布局与外观
  # ============================================================
  - name: layout-appearance
    label: 🎨 布局与外观
    type: group
    description: 导航栏、侧边栏、壁纸、字体等视觉相关配置
    items:
      - name: nav-bar-config
        label: 🧭 导航栏
        type: file
        path: src/config/navBarConfig.ts
        format: code
        description: 导航栏菜单项、链接预设和搜索配置

      - name: sidebar-config
        label: 📐 侧边栏布局
        type: file
        path: src/config/sidebarConfig.ts
        format: code
        description: 侧边栏位置、组件（个人资料、公告、音乐、分类、标签等）的显示和排序

      - name: footer-config
        label: 📏 页脚设置
        type: file
        path: src/config/footerConfig.ts
        format: code
        description: 页脚开关控制

      - name: footer-html
        label: 📏 页脚 HTML
        type: file
        path: src/config/FooterConfig.html
        format: code
        description: 页脚自定义 HTML 内容（备案号、版权信息等）

      - name: font-config
        label: 🔤 字体设置
        type: file
        path: src/config/fontConfig.ts
        format: code
        description: 全局字体、横幅字体、Google Fonts、子集化等配置

      - name: cover-image-config
        label: 🖼️ 文章封面图
        type: file
        path: src/config/coverImageConfig.ts
        format: code
        description: 文章详情页封面图显示和随机图 API 配置

      - name: background-wallpaper
        label: 🏞️ 背景壁纸
        type: file
        path: src/config/backgroundWallpaper.ts
        format: code
        description: 全屏壁纸、横幅壁纸、视频背景、水波纹、渐变等背景特效

      - name: expressive-code-config
        label: 💻 代码块样式
        type: file
        path: src/config/data/expressive-code.json
        format: json
        description: 代码高亮主题、折叠插件、语言徽章等代码块配置
        fields:
          - name: darkTheme
            label: 暗色主题
            type: string
            default: one-dark-pro
          - name: lightTheme
            label: 亮色主题
            type: string
            default: one-light
          - name: collapsibleEnable
            label: 启用代码折叠
            type: boolean
            default: true
          - name: collapsibleLineThreshold
            label: 折叠行数阈值
            type: number
            default: 15
            description: 超过此行数显示折叠按钮
          - name: collapsiblePreviewLines
            label: 折叠预览行数
            type: number
            default: 8
            description: 折叠时显示的行数
          - name: collapsibleDefaultCollapsed
            label: 默认折叠
            type: boolean
            default: true
            description: 长代码块默认折叠
          - name: languageBadgeEnable
            label: 显示语言徽章
            type: boolean
            default: true

  # ============================================================
  # 🔧 功能配置
  # ============================================================
  - name: feature-settings
    label: 🔧 功能配置
    type: group
    description: 评论、统计、音乐、打赏、友链、特效等功能模块配置
    items:
      - name: comment-config
        label: 💬 评论系统
        type: file
        path: src/config/commentConfig.ts
        format: code
        description: Twikoo / Waline / Giscus / Artalk / Disqus 评论系统配置

      - name: analytics-config
        label: 📊 数据统计
        type: file
        path: src/config/analyticsConfig.ts
        format: code
        description: Google Analytics、Microsoft Clarity、Umami、51la 统计配置

      - name: music-config
        label: 🎵 音乐播放器
        type: file
        path: src/config/musicConfig.ts
        format: code
        description: 音乐播放模式（Meting API / 本地音乐）、播放列表、歌词设置

      - name: sponsor-config
        label: 💰 打赏页面
        type: file
        path: src/config/sponsorConfig.ts
        format: code
        description: 打赏用途、支付方式（支付宝/微信/Ko-fi/爱发电）、赞助者列表

      - name: friends-data
        label: 🔗 友链数据
        type: file
        path: src/config/friendsConfig.ts
        format: code
        description: 友链列表（站点名、头像、描述、链接、标签、权重）

      - name: effects-config
        label: 🌸 樱花特效
        type: file
        path: src/config/effectsConfig.ts
        format: code
        description: 樱花飘落动画的数量、速度、尺寸、透明度等参数

      - name: gallery-config
        label: 🖼️ 相册配置
        type: file
        path: src/config/galleryConfig.ts
        format: code
        description: 相册列表（ID、名称、描述、地点、日期、标签、密码）和布局设置

      - name: pio-config
        label: 🎭 看板娘
        type: file
        path: src/config/pioConfig.ts
        format: code
        description: Spine / Live2D 看板娘模型、位置、交互、气泡提示配置

      - name: plantuml-config
        label: 📐 PlantUML 图表
        type: file
        path: src/config/data/plantuml.json
        format: json
        description: PlantUML 服务器地址和明暗主题配置
        fields:
          - name: enable
            label: 启用 PlantUML
            type: boolean
            default: true
          - name: server
            label: 服务器地址
            type: string
            default: https://www.plantuml.com/plantuml
          - name: lightTheme
            label: 亮色主题
            type: string
            description: 留空使用 PlantUML 默认外观
          - name: darkTheme
            label: 暗色主题
            type: string
            default: cyborg

settings:
  content:
    merge: false
