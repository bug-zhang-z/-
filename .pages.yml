# PagesCMS 配置 - Firefly 博客
# 基于 PagesCMS v0.4.x 官方 schema 编写
# 文档: https://pagescms.org/docs/configuration/

media:
  # 文章配图 - 上传到文章目录的 images 子文件夹
  - name: post-images
    label: 文章配图
    input: src/content/posts/images
    output: /images
    categories: [image]

  # public 静态资源 - 封面图、音乐封面等
  - name: assets
    label: 站点资源
    input: public/assets
    output: /assets
    categories: [image]

  # 头图 / 壁纸
  - name: banner
    label: 站点头图
    input: public/assets/images
    output: /assets/images
    categories: [image]

content:
  # ============================================================
  # 博客文章 (collection)
  # ============================================================
  - name: posts
    label: 📝 博客文章
    type: collection
    path: src/content/posts
    format: yaml-frontmatter
    filename: "{primary}.md"
    exclude: ["**/images/**"]
    view:
      primary: title
      fields: [title, published, tags, category, draft, pinned]
      sort: ["published desc", "title asc"]
      search: [title, description, tags, category]
      default:
        sort: published
        order: desc
    fields:
      - name: title
        label: 标题
        type: string
        required: true
        description: 文章标题

      - name: published
        label: 发布时间
        type: date
        required: true
        options:
          time: false
          format: yyyy-MM-dd

      - name: updated
        label: 更新时间
        type: date
        options:
          time: false
          format: yyyy-MM-dd

      - name: draft
        label: 草稿
        type: boolean
        default: false

      - name: description
        label: 文章摘要
        type: text
        description: 简短描述，留空则自动截取正文

      - name: image
        label: 封面图
        type: image
        description: 文章封面图片路径

      - name: tags
        label: 标签
        type: select
        options:
          multiple: true
          creatable: true
          values:
            - { label: 演示, value: 演示 }
            - { label: 示例, value: 示例 }
            - { label: Markdown, value: Markdown }
            - { label: Firefly, value: Firefly }
            - { label: 博客, value: 博客 }
            - { label: 主题, value: 主题 }
            - { label: 教程, value: 教程 }
            - { label: JavaScript, value: JavaScript }
            - { label: Astro, value: Astro }

      - name: category
        label: 分类
        type: string
        description: 文章分类（如"文章示例"、"技术笔记"）

      - name: lang
        label: 语言
        type: select
        options:
          values:
            - { label: 中文, value: "" }
            - { label: English, value: en }
            - { label: 日本語, value: ja }
            - { label: 繁體中文, value: zh_TW }
            - { label: Русский, value: ru }

      - name: pinned
        label: 置顶
        type: boolean
        default: false

      - name: author
        label: 作者
        type: string
        description: 覆盖默认作者名（通常留空）

      - name: sourceLink
        label: 原文链接
        type: string
        description: 转载/翻译文章的原始出处

      - name: licenseName
        label: 许可协议名称
        type: string
        description: 如 CC BY-NC-SA 4.0

      - name: licenseUrl
        label: 许可协议链接
        type: string

      - name: comment
        label: 启用评论
        type: boolean
        default: true

      - name: password
        label: 文章密码
        type: string
        description: 设置后需要密码才能查看（留空为公开）

      - name: passwordHint
        label: 密码提示
        type: string
        description: 提示访问者密码是什么

      - name: body
        label: 正文
        type: rich-text
        required: true

  # ============================================================
  # 关于页面 (file)
  # ============================================================
  - name: about
    label: 📄 关于页面
    type: file
    path: src/content/spec/about.md
    format: yaml-frontmatter
    fields:
      - name: title
        label: 页面标题
        type: string
        default: "关于我"
      - name: body
        label: 正文
        type: rich-text

  # ============================================================
  # 友情链接 (file)
  # ============================================================
  - name: friends
    label: 🔗 友情链接
    type: file
    path: src/content/spec/friends.mdx
    format: yaml-frontmatter
    fields:
      - name: title
        label: 页面标题
        type: string
        default: 友情链接
      - name: description
        label: 页面描述
        type: string
      - name: body
        label: 正文
        type: code
        description: MDX 格式（包含 JSX 组件），使用代码模式编辑

  # ============================================================
  # 留言板 (file)
  # ============================================================
  - name: guestbook
    label: 📬 留言板
    type: file
    path: src/content/spec/guestbook.md
    format: yaml-frontmatter
    fields:
      - name: title
        label: 页面标题
        type: string
        default: 留言板
      - name: body
        label: 正文
        type: rich-text

  # ============================================================
  # 站点配置 - TypeScript 源文件 (file)
  # ============================================================
  - name: site-config
    label: ⚙️ 站点配置
    type: file
    path: src/config/siteConfig.ts
    format: code

settings:
  content:
    merge: false
